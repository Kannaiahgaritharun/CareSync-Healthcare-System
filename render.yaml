services:
  - type: web
    name: caresync-healthcare
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: MOCK_MODE
        value: true
      - key: TWILIO_ACCOUNT_SID
        value: dummy_sid
      - key: TWILIO_AUTH_TOKEN
        value: dummy_token
      - key: TWILIO_PHONE_NUMBER
        value: +1234567890
      - key: TWILIO_WHATSAPP_FROM
        value: whatsapp:+1234567890
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_EMAIL
        value: dummy@gmail.com
      - key: SMTP_PASSWORD
        value: dummy_password
      - key: SMTP_SENDER_NAME
        value: CareSync Health

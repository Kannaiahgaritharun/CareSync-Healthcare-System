{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 mt-5 shadow-sm text-center">
            <i class="bi bi-file-earmark-medical text-primary mb-3" style="font-size: 4rem;"></i>
            <h3 class="dashboard-title mb-2">Step 1: Prescription Image</h3>
            <p class="text-muted mb-4">Do you have a photo of the doctor's prescription for this medicine? Uploading it makes copying the details much easier!</p>
            
            <form method="POST" action="{{ url_for('add_medicine') }}" enctype="multipart/form-data">
                <div class="mb-4 text-start bg-light p-3 rounded border">
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-dark">Upload Prescription (Optional)</label>
                        <input type="file" name="prescription_image" class="form-control" accept="image/*">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-dark">Doctor Name (Optional)</label>
                        <input type="text" name="doctor_name" class="form-control" placeholder="e.g., Dr. Sharma">
                    </div>
                    <div>
                        <label class="form-label fw-semibold text-dark">Hospital/Clinic Name (Optional)</label>
                        <input type="text" name="hospital_name" class="form-control" placeholder="e.g., City Hospital">
                    </div>
                </div>
                
                <div class="d-grid gap-3">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                        <i class="bi bi-upload me-2"></i> Upload & Continue
                    </button>
                    <a href="{{ url_for('add_medicine_details') }}" class="btn btn-outline-secondary fw-semibold">
                        Skip this step <i class="bi bi-arrow-right ms-1"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

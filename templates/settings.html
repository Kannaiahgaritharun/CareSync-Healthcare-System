{% extends "base.html" %}

{% block content %}
<div class="row mb-4">
    <div class="col-12 text-center text-md-start">
        <h3 class="fw-bold text-dark">Profile Settings</h3>
        <p class="text-muted">Manage your personal information and profile picture.</p>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-sm" style="border-radius: 15px;">
            <div class="card-body p-4 p-md-5">
                <form action="{{ url_for('settings') }}" method="POST" enctype="multipart/form-data">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold text-dark small text-uppercase">Full Name</label>
                                <input type="text" class="form-control bg-light border-0" id="name" name="name" value="{{ user.name }}" required style="padding: 12px 15px; border-radius: 10px;">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="phone_number" class="form-label fw-bold text-dark small text-uppercase">Emergency Phone Number</label>
                                <input type="text" class="form-control bg-light border-0" id="phone_number" name="phone_number" value="{{ user.phone_number or '' }}" placeholder="Enter phone number" style="padding: 12px 15px; border-radius: 10px;">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="age" class="form-label fw-bold text-dark small text-uppercase">Age</label>
                                <input type="number" class="form-control bg-light border-0" id="age" name="age" value="{{ user.age or '' }}" min="0" max="150" placeholder="Enter age" style="padding: 12px 15px; border-radius: 10px;">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-4">
                                <label for="profile_image" class="form-label fw-bold text-dark small text-uppercase">Profile Picture</label>
                                <input type="file" class="form-control bg-light border-0" id="profile_image" name="profile_image" accept="image/*" style="padding: 10px; border-radius: 10px;">
                                
                                {% if user.prescription_image %}
                                <div class="mt-3 d-flex align-items-center">
                                    <img src="{{ url_for('static', filename='uploads/' + user.prescription_image) }}" class="rounded-circle border" style="width: 60px; height: 60px; object-fit: cover;">
                                    <span class="ms-3 text-muted small">Current photo</span>
                                </div>
                                {% endif %}
                            </div>
                        </div>
                    </div>
                    
                    <hr class="my-4" style="opacity: 0.1;">
                    
                    <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary fw-bold px-5 py-2 rounded-pill shadow-sm">
                            Save Profile Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
